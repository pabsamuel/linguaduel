<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a0e1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>LinguaDuel — Language Battle Arena</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg0: #0a0e1a;
    --bg1: #101629;
    --bg2: #182038;
    --line: #26304d;
    --text: #e8ecf8;
    --dim: #8b96b8;
    --p1: #22d3ee;        /* player cyan */
    --p1-glow: rgba(34, 211, 238, 0.45);
    --p2: #f43f5e;        /* opponent red/magenta */
    --p2-glow: rgba(244, 63, 94, 0.45);
    --gold: #fbbf24;
    --green: #34d399;
    --red: #f87171;
    --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #1a2342 0%, var(--bg0) 55%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  #root { min-height: 100%; }
  .app { max-width: 720px; margin: 0 auto; padding: 12px 14px 40px; min-height: 100vh; }

  /* ---------- shared ---------- */
  .btn {
    display: inline-block; border: 1px solid var(--line); border-radius: 12px;
    background: linear-gradient(180deg, var(--bg2), var(--bg1));
    color: var(--text); font-size: 16px; font-weight: 700; letter-spacing: 0.3px;
    padding: 14px 22px; cursor: pointer; transition: transform 0.08s ease, box-shadow 0.15s ease, border-color 0.15s;
    user-select: none;
  }
  .btn:hover { border-color: var(--p1); box-shadow: 0 0 18px rgba(34,211,238,0.18); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: linear-gradient(135deg, #0891b2, #0e7490);
    border-color: #22d3ee66; box-shadow: 0 4px 24px rgba(34,211,238,0.25);
    text-transform: uppercase;
  }
  .btn.primary:hover { box-shadow: 0 4px 32px rgba(34,211,238,0.45); }
  .btn.ghost { background: transparent; font-weight: 600; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
  .chip {
    border: 1px solid var(--line); border-radius: 999px; padding: 10px 16px;
    background: var(--bg1); color: var(--dim); font-weight: 700; font-size: 14px;
    cursor: pointer; transition: all 0.12s ease; user-select: none;
  }
  .chip.on { color: #06121a; background: var(--p1); border-color: var(--p1); box-shadow: 0 0 16px var(--p1-glow); }
  .chip.gold.on { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 16px rgba(251,191,36,0.4); }
  .card {
    background: linear-gradient(180deg, var(--bg2), var(--bg1));
    border: 1px solid var(--line); border-radius: 16px; padding: 18px;
  }
  .label { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }

  /* ---------- menu ---------- */
  .logo {
    text-align: center; padding: 26px 0 4px;
    font-size: clamp(38px, 9vw, 56px); font-weight: 900; font-style: italic; letter-spacing: -1px;
    background: linear-gradient(100deg, var(--p1) 20%, #7dd3fc 45%, var(--p2) 80%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 24px rgba(34,211,238,0.25));
  }
  .tagline { text-align: center; color: var(--dim); font-size: 14px; margin-bottom: 22px; letter-spacing: 1px; }
  .menu-section { margin-bottom: 20px; }
  .menu-section .label { display: block; margin-bottom: 10px; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .menu-footer { display: flex; gap: 10px; margin-top: 26px; flex-wrap: wrap; }
  .menu-footer .primary { flex: 1; min-width: 200px; font-size: 18px; padding: 16px; }
  .rating-pill {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    margin: 0 0 18px; padding: 12px; border-radius: 12px;
    background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.25);
    font-weight: 800;
  }
  .rating-pill .num { color: var(--gold); font-size: 22px; }

  /* ---------- HUD ---------- */
  .hud { position: sticky; top: 0; z-index: 20; padding: 10px 0 8px; background: linear-gradient(180deg, var(--bg0) 75%, transparent); }
  .hp-row { display: flex; align-items: center; gap: 10px; }
  .hp-side { flex: 1; min-width: 0; }
  .hp-name { display: flex; justify-content: space-between; font-size: 12px; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
  .hp-name .me { color: var(--p1); } .hp-name .them { color: var(--p2); }
  .hp-track { position: relative; height: 16px; border-radius: 8px; background: #0d1220; border: 1px solid var(--line); overflow: hidden; }
  .hp-fill { position: absolute; top: 0; bottom: 0; transition: width 0.7s cubic-bezier(0.2, 0.9, 0.3, 1); border-radius: 8px; }
  .hp-fill.me { left: 0; background: linear-gradient(90deg, #06b6d4, #22d3ee); box-shadow: 0 0 14px var(--p1-glow); }
  .hp-fill.them { right: 0; background: linear-gradient(90deg, #f43f5e, #fb7185); box-shadow: 0 0 14px var(--p2-glow); }
  .hp-fill.low { animation: lowPulse 0.85s infinite; }
  @keyframes lowPulse { 50% { filter: brightness(1.7) saturate(1.4); } }
  .form-dots { display: flex; gap: 6px; align-items: center; }
  .form-dots .dot { width: 14px; height: 14px; border-radius: 50%; font-size: 0; }
  .form-dots .dot.W { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.5); }
  .form-dots .dot.L { background: var(--red); opacity: 0.75; }
  .hp-num { font-variant-numeric: tabular-nums; }
  .vs-badge {
    flex: 0 0 auto; text-align: center; width: 64px;
  }
  .vs-badge .round { font-size: 11px; color: var(--dim); font-weight: 700; letter-spacing: 1px; }
  .vs-badge .mult {
    font-size: 18px; font-weight: 900; font-style: italic; color: var(--gold);
    text-shadow: 0 0 14px rgba(251,191,36,0.5);
  }
  .vs-badge .mult.hot { animation: multPulse 1s infinite; }
  @keyframes multPulse { 50% { transform: scale(1.15); } }
  .dmg-pop {
    position: absolute; top: -6px; font-size: 22px; font-weight: 900; font-style: italic;
    pointer-events: none; animation: dmgFloat 1.4s ease-out forwards; z-index: 30;
  }
  @keyframes dmgFloat {
    0% { transform: translateY(0) scale(0.6); opacity: 0; }
    15% { transform: translateY(-8px) scale(1.25); opacity: 1; }
    100% { transform: translateY(-46px) scale(1); opacity: 0; }
  }
  .shake { animation: shake 0.45s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
  }

  /* ---------- timer ---------- */
  .timer-wrap { margin: 8px 0 14px; }
  .timer-track { height: 8px; border-radius: 4px; background: #0d1220; border: 1px solid var(--line); overflow: hidden; }
  .timer-fill { height: 100%; border-radius: 4px; transition: width 0.1s linear; }
  .timer-meta { display: flex; justify-content: space-between; margin-top: 5px; font-size: 12px; color: var(--dim); font-weight: 700; }
  .streak { color: var(--gold); }

  /* ---------- challenge ---------- */
  .type-chip {
    display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--purple); border: 1px solid #a78bfa55; background: #a78bfa14;
    padding: 5px 12px; border-radius: 999px; margin-bottom: 12px;
  }
  .prompt-q { font-size: 16px; color: var(--dim); font-weight: 600; margin-bottom: 10px; }
  .prompt-main {
    font-size: clamp(20px, 5.5vw, 30px); font-weight: 800; line-height: 1.35; margin-bottom: 20px;
    text-wrap: balance;
  }
  .prompt-main.phonetic { font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace; color: #93c5fd; letter-spacing: 1px; }
  .speak-btn {
    display: block; margin: 0 auto 20px; padding: 18px 34px; cursor: pointer;
    font-size: 22px; font-weight: 800; color: var(--text);
    background: linear-gradient(135deg, #1d2b4d, #14203c); border: 1px solid var(--p1);
    border-radius: 16px; box-shadow: 0 0 22px rgba(34,211,238,0.25); transition: transform 0.1s;
  }
  .speak-btn:active { transform: scale(0.95); }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 430px) { .options.long { grid-template-columns: 1fr; } }
  .options.single { grid-template-columns: 1fr; }
  .mult-banner {
    position: fixed; top: 16%; left: 50%; z-index: 40; pointer-events: none; white-space: nowrap;
    font-size: clamp(28px, 8vw, 42px); font-weight: 900; font-style: italic; color: var(--gold);
    text-shadow: 0 0 30px rgba(251,191,36,0.65); animation: multBanner 1.8s ease forwards;
  }
  @keyframes multBanner {
    0% { opacity: 0; transform: translateX(-50%) scale(0.4); }
    15% { opacity: 1; transform: translateX(-50%) scale(1.2); }
    30% { transform: translateX(-50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) scale(1); }
  }
  .opt {
    border: 1px solid var(--line); border-radius: 12px; background: var(--bg1);
    color: var(--text); font-size: 16px; font-weight: 700; padding: 14px 12px; cursor: pointer;
    transition: all 0.12s ease; text-align: center; line-height: 1.3;
  }
  .opt:hover:not(:disabled) { border-color: var(--p1); background: #17233f; }
  .opt:active:not(:disabled) { transform: scale(0.97); }
  .opt.picked { border-color: var(--p1); background: #0b3341; box-shadow: 0 0 14px var(--p1-glow); }
  .opt.correct { border-color: var(--green); background: #0b2e22; box-shadow: 0 0 14px rgba(52,211,153,0.35); }
  .opt.wrong { border-color: var(--red); background: #331318; }
  .opt:disabled { cursor: default; opacity: 0.85; }
  .opp-status { margin-top: 14px; text-align: center; font-size: 13px; font-weight: 700; color: var(--dim); }
  .opp-status .locked { color: var(--p2); }
  .pulse-dot { display: inline-block; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.2; } }

  /* ---------- round result ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
    background: rgba(5, 8, 16, 0.82); backdrop-filter: blur(6px); padding: 16px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } }
  .result-card { width: 100%; max-width: 520px; animation: popIn 0.3s cubic-bezier(0.2, 1.4, 0.4, 1); max-height: 88vh; overflow-y: auto; }
  @keyframes popIn { from { transform: scale(0.85); opacity: 0; } }
  .result-title { font-size: 26px; font-weight: 900; font-style: italic; text-align: center; margin-bottom: 14px; letter-spacing: 0.5px; }
  .result-title.win { color: var(--green); text-shadow: 0 0 24px rgba(52,211,153,0.5); }
  .result-title.lose { color: var(--red); text-shadow: 0 0 24px rgba(248,113,113,0.5); }
  .result-title.tie { color: var(--dim); }
  .score-duel { display: flex; align-items: center; justify-content: space-around; margin: 8px 0 16px; }
  .score-duel .side { text-align: center; }
  .score-duel .who { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: var(--dim); }
  .score-duel .pts { font-size: 30px; font-weight: 900; font-variant-numeric: tabular-nums; }
  .score-duel .pts.me { color: var(--p1); } .score-duel .pts.them { color: var(--p2); }
  .score-duel .sub { font-size: 12px; color: var(--dim); }
  .dmg-line { text-align: center; font-size: 17px; font-weight: 800; margin-bottom: 14px; }
  .explain { background: #0d1220; border: 1px solid var(--line); border-radius: 12px; padding: 13px 14px; font-size: 14px; line-height: 1.55; color: #c7d0e8; margin-bottom: 16px; }
  .explain b { color: var(--green); }

  /* ---------- end screen ---------- */
  .end-title { text-align: center; font-size: clamp(40px, 10vw, 60px); font-weight: 900; font-style: italic; margin: 30px 0 6px; letter-spacing: -1px; }
  .end-title.win { color: var(--green); text-shadow: 0 0 40px rgba(52,211,153,0.55); }
  .end-title.lose { color: var(--red); text-shadow: 0 0 40px rgba(248,113,113,0.55); }
  .end-sub { text-align: center; color: var(--dim); font-weight: 700; margin-bottom: 22px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-tile { background: var(--bg1); border: 1px solid var(--line); border-radius: 12px; padding: 14px; text-align: center; }
  .stat-tile .v { font-size: 24px; font-weight: 900; font-variant-numeric: tabular-nums; }
  .stat-tile .k { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: var(--dim); text-transform: uppercase; margin-top: 3px; }
  .elo-delta.up { color: var(--green); } .elo-delta.down { color: var(--red); }
  .lang-acc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .lang-acc-row .flag { width: 96px; flex: 0 0 auto; font-size: 14px; font-weight: 800; }
  .lang-acc-row .track { flex: 1; height: 10px; border-radius: 5px; background: #0d1220; border: 1px solid var(--line); overflow: hidden; }
  .lang-acc-row .fill { height: 100%; background: linear-gradient(90deg, #06b6d4, #34d399); border-radius: 5px; }
  .lang-acc-row .pct { width: 74px; text-align: right; font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--dim); }

  /* ---------- split-screen arena ---------- */
  .arena { display: flex; align-items: center; justify-content: space-between; margin: 0 0 12px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 14px; background: var(--bg1); }
  .fighter { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 64px; }
  .fighter .av { font-size: 34px; line-height: 1; }
  .fighter .av.me-glow { filter: drop-shadow(0 0 10px var(--p1-glow)); }
  .fighter .av.them-glow { filter: drop-shadow(0 0 10px var(--p2-glow)); }
  .fighter .tag { font-size: 10px; font-weight: 800; letter-spacing: 1px; color: var(--p1); }
  .fighter .tag.them { color: var(--p2); }
  .slots { display: flex; align-items: center; gap: 10px; }
  .vs-mid { font-size: 18px; }
  .slot {
    width: 44px; height: 34px; border-radius: 8px; border: 1px dashed var(--line);
    display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--dim);
    transition: all 0.15s;
  }
  .slot.locked { border-style: solid; animation: slotPop 0.3s cubic-bezier(0.2, 1.6, 0.4, 1); }
  .slot.locked.mine { border-color: var(--p1); background: #0b3341; box-shadow: 0 0 12px var(--p1-glow); }
  .slot.locked.theirs { border-color: var(--p2); background: #33131c; box-shadow: 0 0 12px var(--p2-glow); }
  @keyframes slotPop { from { transform: scale(0.5); } }
  .word-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .word-row:last-child { border-bottom: none; }
  .word-row .w { font-weight: 800; font-size: 15px; }
  .word-row .m { font-size: 12px; color: var(--dim); }
  .word-row .star { margin-left: auto; background: none; border: none; font-size: 20px; cursor: pointer; flex: 0 0 auto; }

  /* ---------- confetti & achievements ---------- */
  .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 60; overflow: hidden; }
  .confetti span { position: absolute; top: -18px; border-radius: 2px; opacity: 0.95; animation: confFall linear forwards; }
  @keyframes confFall {
    0% { transform: translateY(-18px) translateX(0) rotate(0deg); opacity: 1; }
    85% { opacity: 1; }
    100% { transform: translateY(104vh) translateX(var(--drift)) rotate(var(--rot)); opacity: 0; }
  }
  .ach-new {
    border-color: rgba(251,191,36,0.5) !important; background: linear-gradient(180deg, #2a2410, #1c1a0e) !important;
    margin-bottom: 16px; animation: achPop 0.5s cubic-bezier(0.2, 1.6, 0.4, 1);
  }
  @keyframes achPop { from { transform: scale(0.7); opacity: 0; } }
  .ach-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
  .ach-row .ico { font-size: 30px; flex: 0 0 auto; filter: drop-shadow(0 0 10px rgba(251,191,36,0.5)); }
  .ach-row .nm { font-weight: 900; color: var(--gold); font-size: 16px; }
  .ach-row .ds { font-size: 13px; color: var(--dim); }
  .trophy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 430px) { .trophy-grid { grid-template-columns: 1fr; } }
  .trophy { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; border: 1px solid var(--line); background: var(--bg1); }
  .trophy .ico { font-size: 24px; }
  .trophy .nm { font-size: 13px; font-weight: 800; }
  .trophy .ds { font-size: 11px; color: var(--dim); }
  .trophy.locked { opacity: 0.45; filter: grayscale(0.8); }
  .trophy.unlocked { border-color: rgba(251,191,36,0.4); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* =====================================================================
   STORAGE — window.storage if the host provides it, localStorage otherwise
   ===================================================================== */
const store = {
  async get(key) {
    try {
      const s = window.storage;
      if (s) {
        if (typeof s.getItem === "function") return await s.getItem(key);
        if (typeof s.get === "function") return await s.get(key);
      }
    } catch (e) { /* fall through */ }
    try { return localStorage.getItem(key); } catch (e) { return null; }
  },
  async set(key, val) {
    try {
      const s = window.storage;
      if (s) {
        if (typeof s.setItem === "function") { await s.setItem(key, val); return; }
        if (typeof s.set === "function") { await s.set(key, val); return; }
      }
    } catch (e) { /* fall through */ }
    try { localStorage.setItem(key, val); } catch (e) { /* ignore */ }
  },
};
const PROFILE_KEY = "linguaduel_profile_v1";
const DEFAULT_PROFILE = { rating: 1000, wins: 0, losses: 0, games: 0, bestStreak: 0, langStats: {}, typeStats: {}, history: [1000], results: [], lastDaily: null, achievements: [], srs: {}, avatar: "🦊", savedWords: [] };

/* =====================================================================
   CONTENT BANK — curated, offline, no API needed
   ===================================================================== */
const LANGS = {
  es: { name: "Spanish",    flag: "🇪🇸" },
  fr: { name: "French",     flag: "🇫🇷" },
  de: { name: "German",     flag: "🇩🇪" },
  ja: { name: "Japanese",   flag: "🇯🇵" },
  tr: { name: "Turkish",    flag: "🇹🇷" },
  pt: { name: "Portuguese", flag: "🇵🇹" },
  it: { name: "Italian",    flag: "🇮🇹" },
  ko: { name: "Korean",     flag: "🇰🇷" },
};
const LANG_CODES = Object.keys(LANGS);

// s: [sentence, englishMeaning, difficulty 1-3]
// w: [english, target] — translate pool (distractors drawn from same language)
// p: [ipa, word, meaning, wrongMeanings x3]
// f: [sentenceWithBlank, options x4, correctIndex, explanation]
const BANK = {
  es: {
    s: [
      ["El gato duerme en la ventana todas las tardes.", "The cat sleeps in the window every afternoon.", 1],
      ["Mañana vamos a la playa con mis primos.", "Tomorrow we're going to the beach with my cousins.", 1],
      ["¿Dónde está la estación de tren más cercana?", "Where is the nearest train station?", 1],
      ["La vida es un sueño, y los sueños, sueños son.", "Life is a dream, and dreams are dreams. (Calderón)", 2],
      ["Aunque llueva, saldremos a caminar por el parque.", "Even if it rains, we'll go for a walk in the park.", 3],
      ["Hace mucho calor en verano aquí.", "It's very hot here in summer.", 1],
      ["No entiendo lo que dices, habla más despacio.", "I don't understand what you're saying, speak more slowly.", 2],
      ["El próximo año quiero aprender a cocinar.", "Next year I want to learn to cook.", 2],
    ],
    w: [["dog","el perro"],["water","el agua"],["book","el libro"],["house","la casa"],["red","rojo"],["to eat","comer"],["night","la noche"],["friend","el amigo"],["cat","el gato"],["sun","el sol"],["bread","el pan"],["milk","la leche"]],
    p: [
      ["ˈɡɾa.sjas","gracias","thank you",["good morning","goodbye","please"]],
      ["ko.ɾaˈson","corazón","heart",["head","crown","song"]],
      ["ma.ˈɲa.na","mañana","tomorrow / morning",["butter","apple","never"]],
      ["a.ˈmi.ɣo","amigo","friend",["enemy","uncle","teacher"]],
      ["es.ˈkwe.la","escuela","school",["squirrel","ladder","excuse"]],
      ["ˈfwe.ɣo","fuego","fire",["game","outside","strength"]],
    ],
    f: [

// All gameplay randomness flows through RNG.fn so Daily Duel can swap in a
// seeded generator — same seed, same rounds, worldwide. Cosmetic randomness
// (taunts) must NOT use it, or player-dependent draws would desync the seed.
const RNG = { fn: Math.random };
const rand = () => RNG.fn();
function seededRng(seed) {
  let t = seed >>> 0;
  return function () {
    t += 0x6D2B79F5;
    let r = Math.imul(t ^ (t >>> 15), t | 1);
    r ^= r + Math.imul(r ^ (r >>> 7), r | 61);
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}
const DAILY_EPOCH = Date.UTC(2026, 6, 13); // Daily Duel #1 on 2026-07-14 UTC
const dailyNumber = () => Math.max(1, Math.floor((Date.now() - DAILY_EPOCH) / 86400000));
const shuffle = (a) => { const x = [...a]; for (let i = x.length - 1; i > 0; i--) { const j = Math.floor(rand() * (i + 1)); [x[i], x[j]] = [x[j], x[i]]; } return x; };
const pick = (a) => a[Math.floor(rand() * a.length)];

// Browser TTS for listening rounds — no audio files, works offline.
const SPEECH_LANG = { es: "es-ES", fr: "fr-FR", de: "de-DE", ja: "ja-JP", tr: "tr-TR", pt: "pt-PT", it: "it-IT", ko: "ko-KR" };
const canSpeak = typeof window !== "undefined" && "speechSynthesis" in window;
function speak(text, lang) {
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = SPEECH_LANG[lang]; u.rate = 0.85;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch (e) { /* no TTS available */ }
}

function makeGenerator(langCodes, srs) {
  const used = new Set();
  // Cross-language rounds need 2+ active languages; in polyglot-style pools
  // (4+ languages) they make up half the rotation — that's the show.
  const crossOK = langCodes.length >= 2;
  const typePool = [
    ...TYPES,
    ...(canSpeak ? ["listen"] : []),
    ...(crossOK ? ["xword", "xsent"] : []),
    ...(crossOK && langCodes.length >= 4 ? ["xword", "xsent"] : []),
  ];
  const pickTwoLangs = () => shuffle(langCodes).slice(0, 2);
  const fresh = (key, poolSize, srsKey) => {
    // returns an unused index for this key, resetting when the pool is spent
    let open = [];
    for (let i = 0; i < poolSize; i++) if (!used.has(key + i)) open.push(i);
    if (open.length === 0) {
      for (let i = 0; i < poolSize; i++) used.delete(key + i);
      open = Array.from({ length: poolSize }, (_, i) => i);
    }
    // Leitner bias (never in seeded daily games — srs is null there):
    // when items in this pool are due for review, usually serve the one
    // in the lowest box (the shakiest memory) instead of a random pick.
    if (srs) {
      const now = Date.now();
      const due = open.filter((i) => { const r = srs[(srsKey || key) + i]; return r && r.due <= now && r.box < 5; });
      if (due.length && rand() < 0.65) {
        due.sort((a, b) => srs[(srsKey || key) + a].box - srs[(srsKey || key) + b].box);
        used.add(key + due[0]);
        return due[0];
      }
    }
    const idx = pick(open);
    used.add(key + idx);
    return idx;
  };

  const nextChallenge = function () {
    const type = pick(typePool);

    if (type === "xword") {
      const [src, dst] = pickTwoLangs();
      const i = fresh("xw:" + dst, BANK[dst].w.length, dst + ":w");
      const [en, dstWord] = BANK[dst].w[i];
      const srcWord = BANK[src].w[i][1];
      const distractors = shuffle(BANK[dst].w.filter((_, j) => j !== i)).slice(0, 3).map((x) => x[1]);
      const opts = shuffle([dstWord, ...distractors]);
      return {
        type, lang: dst, srcLang: src, difficulty: 3, srsId: dst + ":w" + i,
        question: "Translate this " + LANGS[src].name + " word into " + LANGS[dst].name + ":",
        display: "“" + srcWord + "”",
        options: opts,
        correctIndex: opts.indexOf(dstWord),
        explanation: srcWord + " and " + dstWord + " both mean “" + en + "”.",
      };
    }
    if (type === "xsent") {
      const [src, dst] = pickTwoLangs();
      const i = fresh("xs", PARALLEL.length, "xs:" + dst + ":");
      const [en, versions] = PARALLEL[i];
      const correct = versions[dst];
      const distractors = shuffle(PARALLEL.filter((_, j) => j !== i)).slice(0, 3).map((p) => p[1][dst]);
      const opts = shuffle([correct, ...distractors]);
      return {
        type, lang: dst, srcLang: src, difficulty: 3, srsId: "xs:" + dst + ":" + i,
        question: "How do you say this in " + LANGS[dst].name + "?",
        display: "“" + versions[src] + "”",
        options: opts,
        correctIndex: opts.indexOf(correct),
        explanation: "Both sentences mean: “" + en + "”",
      };
    }

    const lang = pick(langCodes);
    const bank = BANK[lang];
    const L = LANGS[lang].name;

    if (type === "guess") {
      const i = fresh(lang + ":s", bank.s.length);
      const [sentence, meaning, diff] = bank.s[i];
      const others = shuffle(LANG_CODES.filter((c) => c !== lang)).slice(0, 5);
      const opts = shuffle([lang, ...others]);
      return {
        type, lang, difficulty: diff, srsId: lang + ":s" + i,
        question: "Which language is this?",
        display: "“" + sentence + "”",
        options: opts.map((c) => LANGS[c].flag + " " + LANGS[c].name),
        correctIndex: opts.indexOf(lang),
        explanation: "That was " + L + ". It means: “" + meaning + "”",
      };
    }
    if (type === "translate") {
      const i = fresh(lang + ":w", bank.w.length);
      const [en, target] = bank.w[i];
      const distractors = shuffle(bank.w.filter((_, j) => j !== i)).slice(0, 3).map((x) => x[1]);
      const opts = shuffle([target, ...distractors]);
      return {
        type, lang, difficulty: 2, srsId: lang + ":w" + i,
        question: "Translate into " + L + ":",
        display: "“" + en + "”",
        options: opts,
        correctIndex: opts.indexOf(target),
        explanation: "“" + en + "” is " + target + " in " + L + ".",
      };
    }
    if (type === "phonetic") {
      const i = fresh(lang + ":p", bank.p.length);
      const [ipa, word, meaning, wrong] = bank.p[i];
      const opts = shuffle([meaning, ...wrong]);
      return {
        type, lang, difficulty: 2, phonetic: true, srsId: lang + ":p" + i,
        question: "You hear this in " + L + " — what does it mean?",
        display: "/ " + ipa + " /",
        options: opts,
        correctIndex: opts.indexOf(meaning),
        explanation: "/" + ipa + "/ is the " + L + " word " + word + ".",
      };
    }
    if (type === "listen") {
      // shares the phonetic pool (and its repeat-tracking key) but plays
      // the word aloud via TTS instead of showing the transcription
      const i = fresh(lang + ":p", bank.p.length);
      const [ipa, word, meaning, wrong] = bank.p[i];
      const opts = shuffle([meaning, ...wrong]);
      return {
        type, lang, difficulty: 2, srsId: lang + ":p" + i,
        speak: word.replace(/\s*\(.*\)$/, ""),
        question: "Listen — what does this " + L + " word mean?",
        display: "",
        options: opts,
        correctIndex: opts.indexOf(meaning),
        explanation: "You heard " + word + " (/" + ipa + "/).",
      };
    }
    // fill
    const i = fresh(lang + ":f", bank.f.length);
    const [sentence, options, correctIndex, why] = bank.f[i];
    return {
      type, lang, difficulty: 3, srsId: lang + ":f" + i,
      question: "Fill the blank (" + L + "):",
      display: sentence,
      options: [...options].map(String),
      correctIndex,
      explanation: why + " → " + sentence.replace("___", options[correctIndex]),
    };
  };

  return function () {
    const ch = nextChallenge();
    if (srs && ch.srsId) {
      const r = srs[ch.srsId];
      if (r && r.seen > 0 && r.due <= Date.now() && r.box < 5) ch.isReview = true;
    }
    return ch;
  };
}

/* =====================================================================
   CEFR RANKS & RANKED MATCHMAKING
   Your ELO maps to a CEFR band (A1→C2). Ranked Match pairs you with a
   simulated opponent at your level or one adjacent — exactly how real
   matchmaking will work once the backend exists.
   ===================================================================== */
const CEFR_BANDS = [["A1", -Infinity], ["A2", 1050], ["B1", 1150], ["B2", 1300], ["C1", 1450], ["C2", 1600]];
const cefrFor = (rating) => { let lv = "A1"; for (const [l, min] of CEFR_BANDS) if (rating >= min) lv = l; return lv; };
const CEFR_BOTS = {
  A1: { acc: 0.42, tMin: 6.5, tMax: 13, rating: 950 },
  A2: { acc: 0.52, tMin: 5.5, tMax: 12, rating: 1100 },
  B1: { acc: 0.62, tMin: 4.5, tMax: 10.5, rating: 1225 },
  B2: { acc: 0.72, tMin: 3.5, tMax: 9, rating: 1375 },
  C1: { acc: 0.83, tMin: 2.8, tMax: 7, rating: 1525 },
  C2: { acc: 0.92, tMin: 2, tMax: 5.5, rating: 1675 },
};
const MATCH_POOL = [
  ["LunaLingo", "🦉"], ["KebabKral", "🐺"], ["MadameOui", "🐸"], ["TokyoDrift", "🐱"],
  ["BerlinBär", "🐻"], ["CapyCarioca", "🦫"], ["SeoulSister", "🐰"], ["RomaRapido", "🦊"],
];
function makeRankedOpponent(myRating) {
  const myLv = cefrFor(myRating);
  const idx = CEFR_BANDS.findIndex(([l]) => l === myLv);
  const roll = Math.random();
  const oppIdx = Math.max(0, Math.min(CEFR_BANDS.length - 1, idx + (roll < 0.5 ? 0 : roll < 0.75 ? 1 : -1)));
  const lv = CEFR_BANDS[oppIdx][0];
  const [name, avatar] = MATCH_POOL[Math.floor(Math.random() * MATCH_POOL.length)];
  return {
    ...CEFR_BOTS[lv], name: "Ranked", bot: name + " " + avatar, avatar, cefr: lv,
    winTaunts: ["gg ez", "too easy", "study more!"], loseTaunts: ["ok that was clean", "rematch??", "nice one"],
  };
}
const AVATARS = ["🦊", "🐱", "🐺", "🦉", "🐸", "🐼", "🐯", "🦄"];

/* =====================================================================
   SPACED REPETITION (Leitner system)
   Every item you answer gets a box 0-5. Correct → next box, wrong → back
   to box 0. Each box has an expanding review interval; when an item is
   due, the generator prefers it over fresh material. Combined with the
   quiz format itself (retrieval practice), mixed types/languages
   (interleaving), and post-round explanations (immediate feedback),
   this is the evidence-backed core of the learning loop.
   ===================================================================== */
const BOX_INTERVAL_DAYS = [0, 1, 3, 7, 14, 30]; // box 0 = due immediately
const srsAfterAnswer = (rec, correct) => {
  const prev = rec || { box: 0, seen: 0, lapses: 0, due: 0 };
  const box = correct ? Math.min(prev.box + 1, 5) : 0;
  return {
    box,
    seen: prev.seen + 1,
    lapses: prev.lapses + (correct ? 0 : 1),
    due: Date.now() + BOX_INTERVAL_DAYS[box] * 86400000,
  };
};

// Tiny WebAudio synth for game feel — no audio files needed.
const SND = {
  muted: false, ctx: null,
  tone(freq, dur, type, gain, delay) {
    setTimeout(() => {
      try {
        this.ctx = this.ctx || new (window.AudioContext || window.webkitAudioContext)();
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.type = type; o.frequency.value = freq; g.gain.value = gain;
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
        o.stop(this.ctx.currentTime + dur);
      } catch (e) { /* no audio available */ }
    }, delay || 0);
  },
  play(kind) {
    if (this.muted) return;
    if (kind === "good") { this.tone(660, 0.12, "sine", 0.12); this.tone(990, 0.2, "sine", 0.12, 110); }
    else if (kind === "bad") { this.tone(170, 0.3, "sawtooth", 0.09); }
    else if (kind === "hit") { this.tone(95, 0.22, "square", 0.15); }
    else if (kind === "mult") { this.tone(440, 0.1, "triangle", 0.12); this.tone(880, 0.22, "triangle", 0.12, 100); }
  },
};
const scoreFor = (correct, timeLeft) => (correct ? BASE_SCORE + Math.round(SPEED_SCORE * Math.max(0, timeLeft) / ROUND_SECONDS) : 0);
const eloDelta = (me, opp, won) => Math.round(32 * ((won ? 1 : 0) - 1 / (1 + Math.pow(10, (opp - me) / 400))));

function HpBar({ side, name, hp, dmgEvent }) {
  const pct = Math.max(0, hp) / MAX_HP * 100;
  return (
    <div className={"hp-side" + (dmgEvent ? " shake" : "")} key={dmgEvent ? dmgEvent.id : "still"}>
      <div className="hp-name">
        {side === "me" ? <span className="me">{name}</span> : <span className="hp-num">{Math.max(0, hp)}</span>}
        {side === "me" ? <span className="hp-num">{Math.max(0, hp)}</span> : <span className="them">{name}</span>}
      </div>
      <div className="hp-track">
        <div className={"hp-fill " + side + (pct < 20 && pct > 0 ? " low" : "")} style={{ width: pct + "%" }} />
        {dmgEvent && (
          <div className="dmg-pop" style={side === "me" ? { right: 4, color: "var(--red)" } : { left: 4, color: "var(--gold)" }}>
            -{dmgEvent.amount}
          </div>
        )}
      </div>
    </div>
  );
}

function Hud({ hp, oppHp, round, oppName, dmg }) {
  const mult = multiplierFor(round);
  return (
    <div className="hud">
      <div className="hp-row">
        <HpBar side="me" name="YOU" hp={hp} dmgEvent={dmg && dmg.to === "me" ? dmg : null} />
        <div className="vs-badge">
          <div className="round">RD {round}</div>
          <div className={"mult" + (mult > 1 ? " hot" : "")}>{mult}×</div>
        </div>
        <HpBar side="them" name={oppName.toUpperCase()} hp={oppHp} dmgEvent={dmg && dmg.to === "them" ? dmg : null} />
      </div>
    </div>
  );
}

function Timer({ timeLeft, streak }) {
  const pct = Math.max(0, timeLeft) / ROUND_SECONDS * 100;
  const color = pct > 50 ? "linear-gradient(90deg,#06b6d4,#22d3ee)" : pct > 25 ? "linear-gradient(90deg,#f59e0b,#fbbf24)" : "linear-gradient(90deg,#dc2626,#f87171)";
  return (
    <div className="timer-wrap">
      <div className="timer-track"><div className="timer-fill" style={{ width: pct + "%", background: color }} /></div>
      <div className="timer-meta">
        <span>{Math.ceil(Math.max(0, timeLeft))}s</span>
        <span className="streak">{streak >= 2 ? "🔥 " + streak + " STREAK" : ""}</span>
      </div>
    </div>
  );
}

function Challenge({ ch, picked, revealed, onPick, oppLocked }) {
  const maxLen = Math.max(...ch.options.map((o) => o.length));
  const optCls = "options" + (maxLen > 26 ? " single" : maxLen > 14 ? " long" : "");
  const chipLang = ch.type === "guess"
    ? "🌐 ???"
    : ch.srcLang
      ? LANGS[ch.srcLang].flag + " " + LANGS[ch.srcLang].name + " → " + LANGS[ch.lang].flag + " " + LANGS[ch.lang].name
      : LANGS[ch.lang].flag + " " + LANGS[ch.lang].name;
  return (
    <div className="card">
      <span className="type-chip">{TYPE_LABEL[ch.type]} · {chipLang}{ch.isReview ? " · 📚 REVIEW" : ""}</span>
      <div className="prompt-q">{ch.question}</div>
      {ch.type === "listen"
        ? <button className="speak-btn" onClick={() => speak(ch.speak, ch.lang)}>🔊 Play sound</button>
        : <div className={"prompt-main" + (ch.phonetic ? " phonetic" : "")}>{ch.display}</div>}
      <div className={optCls}>
        {ch.options.map((opt, i) => {
          let cls = "opt";
          if (revealed) {
            if (i === ch.correctIndex) cls += " correct";
            else if (i === picked) cls += " wrong";
          } else if (i === picked) cls += " picked";
          return (
            <button key={i} className={cls} disabled={picked !== null || revealed} onClick={() => onPick(i)}>
              {opt}
            </button>
          );
        })}
      </div>
      <div className="opp-status">
        {oppLocked
          ? <span className="locked">⚔️ Opponent locked in!</span>
          : <span>Opponent is thinking<span className="pulse-dot"> ●●●</span></span>}
      </div>
    </div>
  );
}

function RoundResult({ r, hp, oppHp, oppName, onNext }) {
  const over = hp <= 0 || oppHp <= 0;
  const title = r.dmg === 0 ? ["tie", "DRAW ROUND"] : r.dmgTo === "them" ? ["win", "YOU WIN THE ROUND"] : ["lose", "ROUND LOST"];
  return (
    <div className="overlay">
      <div className="card result-card">

        <div className="score-duel">

            <div className="who">YOU {r.pCorrect ? "✅" : "❌"}</div>
            <div className="pts me">{r.pScore}</div>
            <div className="sub">{r.pAnswered ? r.pTime.toFixed(1) + "s" : "no answer"}</div>
          </div>
          <div className="side">
            <div className="who">{oppName.toUpperCase()} {r.aiCorrect ? "✅" : "❌"}</div>

          </div>

            ? "No damage — dead even."

        </div>
        <div className="explain"><b>Answer:</b> {r.ch.options[r.ch.correctIndex]} — {r.ch.explanation}</div>

}

// Post-match HP timeline: both players' HP per round.
// Series colors #0891b2 / #f43f5e validated for the dark surface (CVD-safe);
// identity is doubled by direct labels at the line ends.
function HpTimeline({ timeline, oppName }) {
  if (!timeline || timeline.length < 2) return null;
  const pts = [{ hp: MAX_HP, opp: MAX_HP }, ...timeline];
  const W = 320, H = 150, L = 30, R = 56, T = 14, B = 22;
  const x = (i) => L + i * ((W - L - R) / (pts.length - 1));
  const y = (hp) => T + (1 - Math.max(0, hp) / MAX_HP) * (H - T - B);
  const line = (key) => pts.map((p, i) => x(i).toFixed(1) + "," + y(p[key]).toFixed(1)).join(" ");
  const meEndsHigher = pts[pts.length - 1].hp >= pts[pts.length - 1].opp;
  const xTicks = pts.length <= 7 ? pts.map((_, i) => i) : [0, ...pts.map((_, i) => i).filter((i) => i > 0 && i % Math.ceil((pts.length - 1) / 5) === 0), pts.length - 1];
  return (
    <div>
      <div style={{ display: "flex", gap: 16, marginBottom: 6, fontSize: 12, fontWeight: 700, color: "var(--dim)" }}>
        <span><span style={{ display: "inline-block", width: 10, height: 10, borderRadius: 5, background: "#0891b2", marginRight: 5 }} />You</span>
        <span><span style={{ display: "inline-block", width: 10, height: 10, borderRadius: 5, background: "#f43f5e", marginRight: 5 }} />{oppName}</span>
      </div>
      <svg viewBox={"0 0 " + W + " " + H} style={{ width: "100%", display: "block" }}>
        {[MAX_HP, MAX_HP / 2, 0].map((v) => (
          <g key={v}>
            <line x1={L} x2={W - R} y1={y(v)} y2={y(v)} stroke="var(--line)" strokeWidth="1" />
            <text x={L - 5} y={y(v) + 3} textAnchor="end" fontSize="8" fill="var(--dim)">{v}</text>
          </g>
        ))}
        {[...new Set(xTicks)].map((i) => (
          <text key={i} x={x(i)} y={H - 8} textAnchor="middle" fontSize="8" fill="var(--dim)">{i === 0 ? "start" : "R" + i}</text>
        ))}
        <polyline points={line("hp")} fill="none" stroke="#0891b2" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
        <polyline points={line("opp")} fill="none" stroke="#f43f5e" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
        {pts.map((p, i) => i > 0 && (
          <g key={i}>
            <circle cx={x(i)} cy={y(p.hp)} r="3" fill="#0891b2" stroke="var(--bg1)" strokeWidth="1.5" />
            <circle cx={x(i)} cy={y(p.opp)} r="3" fill="#f43f5e" stroke="var(--bg1)" strokeWidth="1.5" />
            <rect x={x(i) - 10} y={T} width="20" height={H - T - B} fill="transparent">
              <title>{"Round " + i + " — You " + p.hp + " HP · " + oppName + " " + p.opp + " HP" + (p.dmg ? " · " + (p.dmgTo === "them" ? "you dealt " : "you took ") + p.dmg : " · no damage")}</title>
            </rect>
          </g>
        ))}
        <text x={W - R + 6} y={y(pts[pts.length - 1].hp) + (meEndsHigher ? -4 : 9)} fontSize="9" fontWeight="800" fill="#22d3ee">YOU</text>
        <text x={W - R + 6} y={y(pts[pts.length - 1].opp) + (meEndsHigher ? 9 : -4)} fontSize="9" fontWeight="800" fill="#fb7185">{oppName.replace(/\s*\S+$/, "").toUpperCase() || oppName.toUpperCase()}</text>
      </svg>
    </div>
  );
}

function RatingSpark({ history }) {
  if (!history || history.length < 2) return <div style={{ color: "var(--dim)", fontSize: 13 }}>Play a few duels to see your rating curve.</div>;
  const min = Math.min(...history), max = Math.max(...history);
  const span = Math.max(1, max - min);
  const pts = history.map((r, i) => (2 + i / (history.length - 1) * 196).toFixed(1) + "," + (44 - (r - min) / span * 38).toFixed(1)).join(" ");
  return (
    <div>
      <svg viewBox="0 0 200 48" style={{ width: "100%", height: 64, display: "block" }} preserveAspectRatio="none">
        <polyline points={pts} fill="none" stroke="var(--gold)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "var(--dim)", fontWeight: 700 }}>
        <span>{min}</span><span>last {history.length} games</span><span>{max}</span>
      </div>
    </div>
  );
}

function LangAccuracyList({ stats }) {
  const rows = Object.entries(stats).filter(([, v]) => v.t > 0);
  if (rows.length === 0) return <div style={{ color: "var(--dim)", fontSize: 14 }}>No answers recorded yet.</div>;
  return (
    <div>
      {rows.sort((a, b) => b[1].t - a[1].t).map(([code, v]) => {
        const pct = Math.round(100 * v.c / v.t);
        return (
          <div className="lang-acc-row" key={code}>
            <div className="flag">{LANGS[code].flag} {LANGS[code].name}</div>
            <div className="track"><div className="fill" style={{ width: pct + "%" }} /></div>
            <div className="pct">{pct}% ({v.c}/{v.t})</div>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("menu"); // menu | game | end | stats
  const [profile, setProfile] = useState(DEFAULT_PROFILE);
  const [selLangs, setSelLangs] = useState(["es"]);
  const [polyglot, setPolyglot] = useState(false);
  const [diffKey, setDiffKey] = useState("ranked");
  const [mode, setMode] = useState("normal"); // normal | daily | ranked
  const [lastGame, setLastGame] = useState(null);
  const [matchOpp, setMatchOpp] = useState(null);

  // Daily Duel: seed the RNG from the day number so every player on Earth
  // gets the same rounds. Normal games restore true randomness.
  const startGame = (m) => {
    RNG.fn = m === "daily" ? seededRng((dailyNumber() * 2654435761) ^ 0x9E3779B9) : Math.random;
    setMode(m);
    if (m === "ranked") {
      const opp = makeRankedOpponent(profile.rating);
      setMatchOpp(opp);
      setScreen("matchmaking");
      setTimeout(() => setScreen("game"), 1800);
    } else {
      setScreen("game");
    }
  };
  const saveWord = (item) => {
    const words = profile.savedWords || [];
    if (words.some((w) => w.id === item.id)) return;
    saveProfile({ ...profile, savedWords: [...words, item] });
  };
  const removeWord = (id) => saveProfile({ ...profile, savedWords: (profile.savedWords || []).filter((w) => w.id !== id) });

  useEffect(() => {
    store.get(PROFILE_KEY).then((raw) => {
      if (raw) { try { setProfile({ ...DEFAULT_PROFILE, ...JSON.parse(raw) }); } catch (e) { /* corrupt -> defaults */ } }
    });
  }, []);
  const saveProfile = (p) => { setProfile(p); store.set(PROFILE_KEY, JSON.stringify(p)); };

  const toggleLang = (code) => {
    setPolyglot(false);
    setSelLangs((cur) => {
      if (cur.includes(code)) return cur.length > 1 ? cur.filter((c) => c !== code) : cur;
      return cur.length >= 3 ? [...cur.slice(1), code] : [...cur, code];
    });
  };

  const finishGame = (result) => {
    const won = result.oppHp <= 0 && result.hp > 0;
    const isDaily = mode === "daily";
    const dNum = dailyNumber();
    const oppRating = mode === "ranked" && matchOpp ? matchOpp.rating : DIFFS[isDaily ? "ranked" : diffKey].rating;
    const dRating = isDaily ? 0 : eloDelta(profile.rating, oppRating, won);
    const merge = (into, from) => {
      const out = { ...into };
      for (const [k, v] of Object.entries(from)) {
        const prev = out[k] || { c: 0, t: 0 };
        out[k] = { c: prev.c + v.c, t: prev.t + v.t };
      }
      return out;
    };
    const srs = { ...(profile.srs || {}) };
    for (const u of result.srsUpdates || []) srs[u.id] = srsAfterAnswer(srs[u.id], u.c);
    const next = {
      ...profile,
      bestStreak: Math.max(profile.bestStreak, result.bestStreak),
      langStats: merge(profile.langStats, result.gameLangStats),
      typeStats: merge(profile.typeStats || {}, result.gameTypeStats || {}),
      srs,
    };
    const ghostUsed = isDaily && !!(profile.dailyGhost && profile.dailyGhost.num === dNum);
    if (isDaily) {
      // dailies are rating-neutral; only the first attempt of the day counts,
      // and that first run becomes the ghost you can race afterwards
      if (!profile.lastDaily || profile.lastDaily.num !== dNum) {
        next.lastDaily = { num: dNum, won, accuracy: result.accuracy };
        next.dailyGhost = { num: dNum, rounds: result.ghostTrack };
      }
    } else {
      next.rating = profile.rating + dRating;
      next.wins = profile.wins + (won ? 1 : 0);
      next.losses = profile.losses + (won ? 0 : 1);
      next.games = profile.games + 1;
      next.history = [...(profile.history || [profile.rating]), profile.rating + dRating].slice(-20);
      next.results = [...(profile.results || []), won ? "W" : "L"].slice(-10);
    }
    const ctx = {
      won, result, diffKey: isDaily ? "ranked" : mode === "ranked" ? "ranked-match" : diffKey, isDaily,
      langCount: isDaily || polyglot ? LANG_CODES.length : selLangs.length,
      langStats: next.langStats,
    };
    const owned = profile.achievements || [];
    const earned = ACHIEVEMENTS.filter((a) => !owned.includes(a.id) && a.test(ctx));
    if (earned.length) next.achievements = [...owned, ...earned.map((a) => a.id)];
    saveProfile(next);
    setLastGame({
      ...result, won, dRating, dailyNum: isDaily ? dNum : null, newAchievements: earned,
      oppName: ghostUsed ? "Your Ghost 👻" : mode === "ranked" && matchOpp ? matchOpp.bot : DIFFS[ctx.diffKey].bot,
    });
    setScreen("end");
  };

  const activeDiffKey = mode === "daily" ? "ranked" : diffKey;
  const todaysGhost = profile.dailyGhost && profile.dailyGhost.num === dailyNumber() ? profile.dailyGhost : null;
  if (screen === "matchmaking" && matchOpp) {

        <button className="btn ghost" onClick={() => setScreen("notebook")}>📒 Word bank ({(profile.savedWords || []).length})</button>
      </div>
    </div>
  );

function Game({ langCodes, diffKey, opp, myAvatar, ghost, srs, onFinish, onQuit }) {
  const diff = opp || DIFFS[diffKey];
  const oppLabel = ghost ? "Your Ghost 👻" : diff.bot;
  const oppAvatar = ghost ? "👻" : diff.avatar || diff.bot.trim().split(" ").pop();
  const genRef = useRef(null);
  if (!genRef.current) genRef.current = makeGenerator(langCodes, srs);

  const [round, setRound] = useState(1);
  const [hp, setHp] = useState(MAX_HP);
  const [oppHp, setOppHp] = useState(MAX_HP);
  const [ch, setCh] = useState(() => genRef.current());
  const [timeLeft, setTimeLeft] = useState(ROUND_SECONDS);
  const [picked, setPicked] = useState(null);
  const [result, setResult] = useState(null);
  const [dmgEvent, setDmgEvent] = useState(null);
  const [streak, setStreak] = useState(0);
  const [oppLocked, setOppLocked] = useState(false);
  const [multBanner, setMultBanner] = useState(null);
  const [muted, setMuted] = useState(SND.muted);

  const gameRef = useRef({
    bestStreak: 0, pCorrectCount: 0, dmgDealt: 0, dmgTaken: 0,
    gameLangStats: {}, gameTypeStats: {}, rounds: 0,
    myHp: MAX_HP, oppHpNow: MAX_HP, minHp: MAX_HP, fastCorrect: false, timeline: [], ghostTrack: [], srsUpdates: [], seenItems: [],
  });
  const roundRef = useRef(null);
  if (!roundRef.current) roundRef.current = planFor(ch, 1);

  function newAiPlan(challenge, d) {
    const langMod = (d.langMod && d.langMod[challenge.lang]) || 0;
    const acc = Math.min(0.97, Math.max(0.15, d.acc + langMod - (challenge.difficulty - 2) * 0.07));
    const willBeCorrect = rand() < acc;
    const wrongOpts = challenge.options.map((_, i) => i).filter((i) => i !== challenge.correctIndex);
    const wrongIndex = wrongOpts[Math.floor(rand() * wrongOpts.length)];
    return {
      start: Date.now(),
      answerAt: d.tMin + rand() * (d.tMax - d.tMin),
      willBeCorrect,
      index: willBeCorrect ? challenge.correctIndex : wrongIndex,
      wrongIndex,
      playerPick: null,
      playerTime: null,
    };
  }

  // Ghost mode (daily replay): the opponent replays YOUR recorded first run.
  // newAiPlan still burns its seeded RNG draws first so the challenge stream
  // stays identical to the original attempt; the ghost then overrides them.
  function planFor(challenge, roundNum) {
    const plan = newAiPlan(challenge, diff);
    if (ghost) {
      const gr = ghost.rounds[roundNum - 1];
      if (gr && gr.t != null) {
        plan.willBeCorrect = gr.c;
        plan.answerAt = gr.t;
        plan.index = gr.c ? challenge.correctIndex : plan.wrongIndex;
      } else {
        plan.willBeCorrect = false;
        plan.answerAt = ROUND_SECONDS + 1; // the ghost never answered here
      }
    }
    return plan;
  }

  const resolveRound = useCallback(() => {
    const R = roundRef.current;
    if (R.resolved) return;
    R.resolved = true;

    const pAnswered = R.playerPick !== null;
    const pCorrect = pAnswered && R.playerPick === ch.correctIndex;
    const pTimeLeft = pAnswered ? Math.max(0, ROUND_SECONDS - R.playerTime) : 0;
    const elapsed = (Date.now() - R.start) / 1000;
    const aiAnswered = R.answerAt <= Math.min(elapsed, ROUND_SECONDS);
    const aiCorrect = aiAnswered && R.willBeCorrect;
    const aiTimeLeft = aiAnswered ? Math.max(0, ROUND_SECONDS - R.answerAt) : 0;

    const pScore = scoreFor(pCorrect, pTimeLeft);
    const aiScore = scoreFor(aiCorrect, aiTimeLeft);
    const mult = multiplierFor(round);
    const dmg = Math.round(Math.abs(pScore - aiScore) * mult);
    const dmgTo = pScore === aiScore ? null : pScore > aiScore ? "them" : "me";

    const G = gameRef.current;
    G.rounds = round;
    const ls = G.gameLangStats[ch.lang] || { c: 0, t: 0 };
    G.gameLangStats[ch.lang] = { c: ls.c + (pCorrect ? 1 : 0), t: ls.t + 1 };
    const ts = G.gameTypeStats[ch.type] || { c: 0, t: 0 };
    G.gameTypeStats[ch.type] = { c: ts.c + (pCorrect ? 1 : 0), t: ts.t + 1 };
    if (pCorrect) { G.pCorrectCount++; }
    const newStreak = pCorrect ? streak + 1 : 0;
    G.bestStreak = Math.max(G.bestStreak, newStreak);
    setStreak(newStreak);

    if (dmgTo === "me") { setHp((h) => h - dmg); G.dmgTaken += dmg; G.myHp -= dmg; }
    if (dmgTo === "them") { setOppHp((h) => h - dmg); G.dmgDealt += dmg; G.oppHpNow -= dmg; }
    G.minHp = Math.min(G.minHp, G.myHp);
    if (pCorrect && R.playerTime < 2) G.fastCorrect = true;
    G.timeline.push({ hp: Math.max(0, G.myHp), opp: Math.max(0, G.oppHpNow), pCorrect, dmg, dmgTo });
    G.ghostTrack.push({ t: pAnswered ? Math.round(R.playerTime * 100) / 100 : null, c: pCorrect });
    if (ch.srsId) G.srsUpdates.push({ id: ch.srsId, c: pCorrect });
    if (ch.srsId && !G.seenItems.some((s) => s.id === ch.srsId)) {
      G.seenItems.push({
        id: ch.srsId, lang: ch.lang, correct: pCorrect,
        answer: ch.options[ch.correctIndex], note: ch.explanation,
      });
    }
    if (dmg > 0) setDmgEvent({ id: Date.now(), to: dmgTo, amount: dmg });
    SND.play(pCorrect ? "good" : "bad");
    if (dmg > 0) setTimeout(() => SND.play("hit"), 260);

    // taunts stay on Math.random — pick() would consume the daily seed
    const tauntPool = dmgTo === "me" ? diff.winTaunts : diff.loseTaunts;
    const taunt = !ghost && dmgTo && Math.random() < 0.65
      ? tauntPool[Math.floor(Math.random() * tauntPool.length)]
      : null;
    setResult({
      ch, mult, dmg, dmgTo, taunt,
      pAnswered, pCorrect, pScore, pTime: R.playerTime || 0,
      aiAnswered, aiCorrect, aiScore, aiTime: R.answerAt,
    });
  }, [ch, round, streak]);

  // master tick
  useEffect(() => {
    if (result) return;
    const iv = setInterval(() => {
      const R = roundRef.current;
      const elapsed = (Date.now() - R.start) / 1000;
      const left = ROUND_SECONDS - elapsed;
      setTimeLeft(left > 0 ? left : 0);
      const aiDone = elapsed >= R.answerAt;
      setOppLocked(aiDone);
      const playerDone = R.playerPick !== null;
      if (left <= 0 || (aiDone && playerDone)) {
        clearInterval(iv);
        setTimeout(resolveRound, playerDone && aiDone ? 350 : 0);
      }
    }, 100);
    return () => clearInterval(iv);
  }, [result, resolveRound, round]);

  const onPick = (i) => {
    const R = roundRef.current;
    if (R.playerPick !== null || result) return;
    R.playerPick = i;
    R.playerTime = Math.min(ROUND_SECONDS, (Date.now() - R.start) / 1000);
    setPicked(i);
  };

  const nextRound = () => {
    if (hp <= 0 || oppHp <= 0) {
      const G = gameRef.current;
      onFinish({
        hp, oppHp,
        rounds: G.rounds,
        accuracy: G.rounds ? Math.round(100 * G.pCorrectCount / G.rounds) : 0,
        dmgDealt: G.dmgDealt, dmgTaken: G.dmgTaken,
        bestStreak: G.bestStreak,
        gameLangStats: G.gameLangStats,
        gameTypeStats: G.gameTypeStats,
        timeline: G.timeline, minHp: G.minHp, fastCorrect: G.fastCorrect, ghostTrack: G.ghostTrack,
        srsUpdates: G.srsUpdates, seenItems: G.seenItems,
      });
      return;
    }
    const nextCh = genRef.current();
    roundRef.current = planFor(nextCh, round + 1);
    const newMult = multiplierFor(round + 1);
    if (newMult > multiplierFor(round)) {
      setMultBanner(newMult);
      SND.play("mult");
      setTimeout(() => setMultBanner(null), 1900);
    }
    setCh(nextCh);
    setRound((r) => r + 1);
    setPicked(null);
    setOppLocked(false);
    setTimeLeft(ROUND_SECONDS);
    setResult(null);
  };

  // listen rounds speak automatically as they appear
  useEffect(() => {
    if (ch.type === "listen") speak(ch.speak, ch.lang);
  }, [ch]);

  // keyboard: 1-6 to answer, Enter to advance past the round result
  useEffect(() => {
    const onKey = (e) => {
      if (result) { if (e.key === "Enter") nextRound(); return; }
      const n = parseInt(e.key, 10);
      if (n >= 1 && n <= ch.options.length) onPick(n - 1);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  });

  return (
    <div className="app">
      <Hud hp={hp} oppHp={oppHp} round={round} oppName={oppLabel} dmg={dmgEvent} />
      <Timer timeLeft={timeLeft} streak={streak} />
      <div className="arena">
        <div className="fighter"><span className="av me-glow">{myAvatar}</span><span className="tag">YOU</span></div>
        <div className="slots">
          <div className={"slot" + (picked !== null ? " locked mine" : "")}>{picked !== null ? "🔒" : "·"}</div>
          <span className="vs-mid">⚡</span>
          <div className={"slot" + (oppLocked ? " locked theirs" : "")}>{oppLocked ? "🔒" : "·"}</div>
        </div>
        <div className="fighter"><span className="av them-glow">{oppAvatar}</span><span className="tag them">{oppLabel.replace(/\s*\S+$/, "") || oppLabel}</span></div>
      </div>
      <Challenge ch={ch} picked={picked} revealed={!!result} onPick={onPick} oppLocked={oppLocked} />
      <div style={{ textAlign: "center", marginTop: 18, display: "flex", gap: 10, justifyContent: "center" }}>
        <button className="btn ghost" style={{ fontSize: 13, padding: "8px 14px" }} onClick={onQuit}>Forfeit duel</button>
        <button className="btn ghost" style={{ fontSize: 13, padding: "8px 14px" }}
          onClick={() => { SND.muted = !SND.muted; setMuted(SND.muted); }}>
          {muted ? "🔇 Sound off" : "🔊 Sound on"}
        </button>
      </div>
      {multBanner && <div className="mult-banner">⚡ DAMAGE ×{multBanner}</div>}
      {result && <RoundResult r={result} hp={hp} oppHp={oppHp} oppName={oppLabel} onNext={nextRound} />}
    </div>
  );
}

function EndScreen({ g, oppName, savedWords, onSave, onAgain, onMenu }) {
  const [copied, setCopied] = useState(false);
  const savedIds = new Set((savedWords || []).map((w) => w.id));
  const shareResult = () => {
    const flags = Object.keys(g.gameLangStats).map((c) => LANGS[c].flag).join("");
    const title = g.dailyNum != null ? "🗓️ LinguaDuel Daily #" + g.dailyNum : "⚔️ LinguaDuel";
    const text =
      title + " — " + (g.won ? "VICTORY" : "DEFEAT") + " vs " + oppName + "\n" +
      "🎯 " + g.accuracy + "% acc · 🔥" + g.bestStreak + " streak · " + g.rounds + " rounds " + flags + "\n" +
      "💥 " + g.dmgDealt + " dealt / " + g.dmgTaken + " taken · rating " + (g.dRating >= 0 ? "+" : "") + g.dRating;
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 2000); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => {});
    } else {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); done(); } catch (e) { /* ignore */ }
      document.body.removeChild(ta);
    }
  };
  return (
    <div className="app">
      {g.won && <Confetti />}
      <div className={"end-title " + (g.won ? "win" : "lose")}>{g.won ? "VICTORY" : "DEFEAT"}</div>
      <div className="end-sub">
        {g.dailyNum != null ? "🗓️ Daily Duel #" + g.dailyNum + " — " : ""}
        {g.won ? "You destroyed " + oppName + " in " + g.rounds + " rounds" : oppName + " took you down in " + g.rounds + " rounds"}
      </div>
      <div className="stat-grid">
        {g.dailyNum != null ? (
          <div className="stat-tile"><div className="v">🗓️ #{g.dailyNum}</div><div className="k">Daily duel</div></div>
        ) : (
          <div className="stat-tile">
            <div className={"v elo-delta " + (g.dRating >= 0 ? "up" : "down")}>{g.dRating >= 0 ? "+" : ""}{g.dRating}</div>
            <div className="k">Rating</div>
          </div>
        )}
        <div className="stat-tile"><div className="v">{g.accuracy}%</div><div className="k">Accuracy</div></div>
        <div className="stat-tile"><div className="v">🔥 {g.bestStreak}</div><div className="k">Best streak</div></div>
        <div className="stat-tile"><div className="v">{g.dmgDealt}</div><div className="k">Damage dealt</div></div>
        <div className="stat-tile"><div className="v">{g.dmgTaken}</div><div className="k">Damage taken</div></div>
        <div className="stat-tile"><div className="v">{g.rounds}</div><div className="k">Rounds</div></div>
      </div>
      {g.newAchievements && g.newAchievements.length > 0 && (
        <div className="card ach-new">
          <span className="label" style={{ display: "block", marginBottom: 6, color: "var(--gold)" }}>🏆 New achievement{g.newAchievements.length > 1 ? "s" : ""}</span>
          {g.newAchievements.map((a) => (
            <div className="ach-row" key={a.id}>
              <span className="ico">{a.icon}</span>
              <span><div className="nm">{a.name}</div><div className="ds">{a.desc}</div></span>
            </div>
          ))}
        </div>
      )}
      <div className="card" style={{ marginBottom: 16 }}>
        <span className="label" style={{ display: "block", marginBottom: 10 }}>Match timeline</span>
        <HpTimeline timeline={g.timeline} oppName={oppName} />
      </div>
      {g.seenItems && g.seenItems.length > 0 && (
        <div className="card" style={{ marginBottom: 16 }}>
          <span className="label" style={{ display: "block", marginBottom: 8 }}>Words from this duel — ⭐ to save</span>
          {g.seenItems.map((w) => (
            <div className="word-row" key={w.id}>
              <span>{w.correct ? "✅" : "❌"} {LANGS[w.lang] ? LANGS[w.lang].flag : "🌐"}</span>
              <span><div className="w">{w.answer}</div><div className="m">{w.note}</div></span>
              <button className="star" onClick={() => onSave(w)} title="Save to word bank">
                {savedIds.has(w.id) ? "⭐" : "☆"}
              </button>
            </div>
          ))}
        </div>
      )}
      <div className="card" style={{ marginBottom: 18 }}>
        <span className="label" style={{ display: "block", marginBottom: 12 }}>Accuracy by language (this duel)</span>
        <LangAccuracyList stats={g.gameLangStats} />
      </div>
      <div className="menu-footer">
        <button className="btn primary" onClick={onAgain}>⚔️ Rematch</button>
        <button className="btn ghost" onClick={shareResult}>{copied ? "✅ Copied!" : "📋 Share result"}</button>
        <button className="btn ghost" onClick={onMenu}>Menu</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
